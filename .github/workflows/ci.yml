name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lock'

jobs:
  prepare-release:
    name: Compute Version and Tag Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump-version.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Version
        id: bump-version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -ra LOCAL_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${LOCAL_PARTS[0]}
          MINOR=${LOCAL_PARTS[1]}

          # Get latest published version from npm
          NPM_LATEST=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "")

          if [ -z "$NPM_LATEST" ]; then
            NEW_PATCH=0
          else
            IFS='.' read -ra NPM_PARTS <<< "$NPM_LATEST"
            NPM_MAJOR=${NPM_PARTS[0]}
            NPM_MINOR=${NPM_PARTS[1]}
            NPM_PATCH=${NPM_PARTS[2]}
            if [ "$NPM_MAJOR" = "$MAJOR" ] && [ "$NPM_MINOR" = "$MINOR" ]; then
              NEW_PATCH=$((NPM_PATCH + 1))
            else
              NEW_PATCH=0
            fi
          fi

          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Tag Release
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.bump-version.outputs.new_version }}" -m "Release v${{ steps.bump-version.outputs.new_version }}"
          git push origin "v${{ steps.bump-version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump-version.outputs.new_version }}
          name: Release v${{ steps.bump-version.outputs.new_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [ prepare-release ]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Use Cached node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun ci

      - name: Set Version
        run: jq '.version = "${{ needs.prepare-release.outputs.new_version }}"' package.json > _tmp.json && mv _tmp.json package.json

      - name: Publish To npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ''

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    needs: [ prepare-release ]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Use Cached node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun ci

      - name: Set Version
        run: |
          jq '.version = "${{ needs.prepare-release.outputs.new_version }}"' package.json > _tmp.json && mv _tmp.json package.json
          bun run ./scripts/bumpJsrVersion.ts ${{ needs.prepare-release.outputs.new_version }}

      - name: Publish to JSR
        run: bunx jsr publish
